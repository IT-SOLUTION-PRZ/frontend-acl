version: '3.8'

services:
  frontend-acl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acl-frontend-ui
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    networks:
      - acl-network

networks:
  acl-network:
    external: true